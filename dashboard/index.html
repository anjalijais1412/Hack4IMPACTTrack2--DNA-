 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WATT_THE_WASTE! Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #0d1b2a; color: #e0e0e0; }
  header { background: #122035; padding: 14px 24px;
           display: flex; align-items: center; gap: 16px;
           border-bottom: 1px solid #1e3a5f; flex-wrap: wrap; }
  header h1 { color: #4ade80; font-size: 20px; }
  header p  { font-size: 12px; color: #64748b; }
  .btn { background: #4ade80; color: #0d1b2a; border: none;
         border-radius: 8px; padding: 9px 18px; font-size: 13px;
         font-weight: 700; cursor: pointer; }
  .btn:hover { background: #22c55e; }
  .btn-blue { background: #3b82f6; color: #fff; }
  .btn-blue:hover { background: #2563eb; }
  .stats { display: grid;
           grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
           gap: 12px; padding: 20px 24px 0; }
  .stat { background: #1e2d3d; border-radius: 10px; padding: 14px; }
  .stat label { font-size: 11px; color: #64748b;
                text-transform: uppercase; letter-spacing: .5px; }
  .stat .val { font-size: 26px; font-weight: 700;
               color: #4ade80; margin-top: 4px; }
  .stat .unit { font-size: 11px; color: #475569; margin-top: 2px; }
  h2 { font-size: 13px; font-weight: 600; color: #94a3b8;
       padding: 16px 24px 8px; text-transform: uppercase; letter-spacing: .5px; }
  .bins { display: grid;
          grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
          gap: 10px; padding: 0 24px; }
  .bin { background: #1e2d3d; border-radius: 8px; padding: 12px; }
  .bin h4 { font-size: 12px; margin-bottom: 8px; color: #cbd5e1; }
  .bar-bg { background: #0d1b2a; border-radius: 4px;
            height: 8px; overflow: hidden; }
  .bar { height: 8px; border-radius: 4px; transition: width .6s; }
  .bin-meta { display: flex; justify-content: space-between;
              margin-top: 6px; font-size: 11px; color: #64748b; }
  .tag { display: inline-block; padding: 2px 7px;
         border-radius: 10px; font-size: 10px; font-weight: 500; }
  .tag.wet   { background: #14532d; color: #4ade80; }
  .tag.dry   { background: #1e3a5f; color: #60a5fa; }
  .tag.mixed { background: #451a03; color: #fb923c; }
  .risk-h { color: #f87171; font-size: 10px; }
  .risk-l { color: #4ade80; font-size: 10px; }
  .alerts-box, .route-box {
    margin: 0 24px 16px;
    background: #1e2d3d;
    border-radius: 10px; padding: 14px; }
  .alert-item { background: #122035;
                border-left: 3px solid #f59e0b;
                border-radius: 0 6px 6px 0;
                padding: 9px 12px; margin-bottom: 8px;
                font-size: 12px; color: #cbd5e1; }
  .stop { display: inline-block; background: #0d1b2a;
          border-radius: 6px; padding: 5px 12px;
          margin: 4px; font-size: 12px; color: #4ade80; }
  footer { text-align: center; padding: 16px;
           font-size: 11px; color: #334155; }
</style>
</head>
<body>
<header>
  <div>
    <h1>WATT_THE_WASTE!</h1>
    <p>Smart Waste Dashboard — Team DNA | KIIT DU | HACK4IMPACT Track 2</p>
  </div>
  <div style="margin-left:auto;display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn" onclick="loadAll()">Refresh</button>
    <button class="btn btn-blue" onclick="runBots()">Run UiPath Bots</button>
  </div>
</header>

<div class="stats">
  <div class="stat"><label>Total Bins</label>
    <div class="val" id="s-total">--</div></div>
  <div class="stat"><label>Need Collection</label>
    <div class="val" id="s-full" style="color:#f87171">--</div></div>
  <div class="stat"><label>Overflow Risk</label>
    <div class="val" id="s-risk" style="color:#f59e0b">--</div></div>
  <div class="stat"><label>Energy Generated</label>
    <div class="val" id="s-energy">--</div>
    <div class="unit">kWh today</div></div>
  <div class="stat"><label>CO₂ Saved</label>
    <div class="val" id="s-co2">--</div>
    <div class="unit">kg avoided</div></div>
</div>

<h2>Bin Status</h2>
<div class="bins" id="bins-grid"></div>

<h2>Citizen Alerts (500m radius)</h2>
<div class="alerts-box" id="alerts-box">Loading...</div>

<h2>Optimized Collection Route</h2>
<div class="route-box" id="route-box">Loading...</div>

<footer>WATT_THE_WASTE! &mdash;
  Team DNA: Anjali Jaiswal, Nisha Singh, Dhruv Bafana &mdash; KIIT DU</footer>

<script>
const API = "http://localhost:5000/api";

async function loadDashboard() {
  try {
    const r = await fetch(API + "/dashboard").then(r => r.json());
    document.getElementById("s-total").textContent = r.total_bins;
    document.getElementById("s-full").textContent  = r.full_bins;
    document.getElementById("s-risk").textContent  = r.overflow_risk;
    document.getElementById("s-energy").textContent = r.energy_kwh;
    document.getElementById("s-co2").textContent   = r.co2_saved_kg;
  } catch(e) { console.error("Dashboard error:", e); }
}

async function loadBins() {
  try {
    const bins = await fetch(API + "/bins").then(r => r.json());
    document.getElementById("bins-grid").innerHTML = bins.map(b => {
      const col = b.fill_level > 75 ? "#ef4444"
                : b.fill_level > 50 ? "#f59e0b" : "#4ade80";
      const risk = b.prediction?.overflow_risk
        ? '<span class="risk-h">Overflow risk</span>'
        : '<span class="risk-l">Normal</span>';
      return `<div class="bin">
        <h4>${b.bin_id} <small style="color:#475569">
          ${b.zone || ""}</small></h4>
        <div class="bar-bg">
          <div class="bar"
            style="width:${b.fill_level}%;background:${col}">
          </div></div>
        <div class="bin-meta">
          <span>${b.fill_level}%</span>
          <span class="tag ${b.waste_type}">${b.waste_type}</span>
        </div>
        <div style="margin-top:5px">${risk}</div>
      </div>`;
    }).join("");
  } catch(e) { console.error("Bins error:", e); }
}

async function loadAlerts() {
  try {
    const alerts = await fetch(
      API + "/alerts?lat=20.2961&lng=85.8245"
    ).then(r => r.json());
    const el = document.getElementById("alerts-box");
    el.innerHTML = alerts.length
      ? alerts.map(a =>
          `<div class="alert-item">${a.message}
           <span style="color:#64748b">(${a.distance_m}m)</span>
          </div>`).join("")
      : `<p style="color:#4ade80;font-size:13px">
           No urgent collections nearby</p>`;
  } catch(e) { console.error("Alerts error:", e); }
}

async function loadRoute() {
  try {
    const r = await fetch(API + "/route").then(r => r.json());
    document.getElementById("route-box").innerHTML =
      r.optimized_route.length
      ? `<p style="font-size:12px;color:#64748b;margin-bottom:8px">
           ${r.total_stops} stops — est. ${r.estimated_time_mins} min
         </p>` +
        r.optimized_route.map((s, i) =>
          `<span class="stop">${i+1}. ${s}</span>`
        ).join(" &rarr; ")
      : `<p style="color:#4ade80;font-size:13px">
           All bins within normal range</p>`;
  } catch(e) { console.error("Route error:", e); }
}

async function runBots() {
  try {
    const r = await fetch(API + "/run-bots",
      {method:"POST"}).then(r => r.json());
    alert(r.status);
  } catch(e) { alert("Could not reach Flask API. Is it running?"); }
}

function loadAll() {
  loadDashboard();
  loadBins();
  loadAlerts();
  loadRoute();
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
